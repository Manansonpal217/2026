# Local development only — do NOT use this file in production.
# Production docker-compose lives on the DigitalOcean droplet at /opt/tracksync/docker-compose.yml.
# See docs/DEPLOY_DIGITALOCEAN.md for the production compose file content.

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    # Host 13001 so local `npm run dev` in packages/backend can bind :3001 without EADDRINUSE.
    ports:
      - "127.0.0.1:13001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tracksync_dev?connection_limit=10
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      APP_URL: http://localhost:3002
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tracksync_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  pgweb:
    image: sosedoff/pgweb:latest
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/tracksync_dev?sslmode=disable
    ports:
      - "5050:8081"
    depends_on:
      - postgres

volumes:
  postgres_data: {}
