name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3-multiple-ciphers for Node (desktop unit tests)
        run: pnpm --filter desktop exec npm rebuild better-sqlite3-multiple-ciphers

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Docker build (backend)
        run: docker build -f packages/backend/Dockerfile -t tracksync-backend:ci .

      - name: Docker build (landing)
        run: docker build -f packages/landing/Dockerfile -t tracksync-landing:ci .
