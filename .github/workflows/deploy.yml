# Build and push Docker images to GHCR with staging / production tags.
# Configure GitHub Environments "staging" and "production" for protection rules on production deploys.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (image tag prefix)'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
  push:
    branches:
      - main

concurrency:
  group: deploy-docker-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: write
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/manansonpal217/tracksync-backend:${{ env.TARGET_ENV }}
            ghcr.io/manansonpal217/tracksync-backend:${{ env.TARGET_ENV }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/landing/Dockerfile
          push: true
          tags: |
            ghcr.io/manansonpal217/tracksync-landing:${{ env.TARGET_ENV }}
            ghcr.io/manansonpal217/tracksync-landing:${{ env.TARGET_ENV }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to Droplet
        # Only SSH-deploy when targeting production; staging can be a separate droplet/step later.
        if: env.TARGET_ENV == 'production'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: /opt/tracksync/deploy.sh
