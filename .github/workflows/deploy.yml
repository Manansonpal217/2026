# Build and push Docker images to GHCR with staging / production tags.
# Configure GitHub Environments "staging" and "production" for protection rules on production deploys.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (image tag prefix)'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
  push:
    branches:
      - main

concurrency:
  group: deploy-docker-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: write
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tracksync-backend:${{ env.TARGET_ENV }}
            ghcr.io/${{ github.repository_owner }}/tracksync-backend:${{ env.TARGET_ENV }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/landing/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tracksync-landing:${{ env.TARGET_ENV }}
            ghcr.io/${{ github.repository_owner }}/tracksync-landing:${{ env.TARGET_ENV }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
