name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'GitHub Environment for baked API/landing URLs and update feed'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

jobs:
  release:
    # Tag releases use production; manual dispatch selects staging or production.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'production' }}
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: mac
          - platform: windows-latest
            target: win
          - platform: ubuntu-22.04
            target: linux
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm rebuild:desktop

      - name: Build desktop
        run: pnpm --filter desktop build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_LANDING_URL: ${{ vars.VITE_LANDING_URL }}
          AUTO_UPDATE_BASE_URL: ${{ vars.AUTO_UPDATE_BASE_URL }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}

      - name: Build desktop app (electron-builder)
        run: pnpm --filter desktop exec electron-builder --${{ matrix.target }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
