appId: io.tracksync.app
productName: TrackSync
directories:
  buildResources: build
  output: release
# NSIS / macOS: register tracksync:// for OAuth and deep links
protocols:
  - name: TrackSync
    schemes:
      - tracksync
files:
  - out/**/*
  - package.json
# All native modules (*.node) and packages with platform dylibs/so files
# MUST be outside the asar - you cannot dlopen files from inside an asar archive
asarUnpack:
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/uiohook-napi/**
  - node_modules/keytar/**
  - node_modules/better-sqlite3-multiple-ciphers/**
  - node_modules/get-windows/**
  - node_modules/screenshot-desktop/**
  - node_modules/prebuild-install/**
  - "**/*.node"
  - "**/*.dylib"
  - "**/*.so"
  - "**/*.dll"
mac:
  icon: build/app.icns
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  icon: build/app.ico
  # signAndEditExecutable=false skips rcedit/wine call that embeds EXE metadata
  # Needed for cross-compile from Apple Silicon (bundled Wine lacks FreeType)
  signAndEditExecutable: false
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
publish:
  provider: github
  releaseType: release
  # Tag format: desktop-v<version>  (e.g. desktop-v1.2.3)
  # Push this tag to trigger the release-desktop CI workflow.
  tagName: desktop-v${version}
