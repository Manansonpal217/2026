appId: io.tracksync.app
productName: TrackSync
directories:
  buildResources: build
  output: release
# NSIS / macOS: register tracksync:// for OAuth and deep links
protocols:
  - name: TrackSync
    schemes:
      - tracksync
# If package.json has a top-level "build" field, electron-builder ignores this file entirely
# and uses default "pack everything" globs — that accidentally bundled `release/` (~800MB+ of old installers).
files:
  - out/**/*
  - package.json
  - '!release/**'
  - '!dist/**'
# All native modules (*.node) and packages with platform dylibs/so files
# MUST be outside the asar - you cannot dlopen files from inside an asar archive
asarUnpack:
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/uiohook-napi/**
  - node_modules/keytar/**
  - node_modules/better-sqlite3-multiple-ciphers/**
  - node_modules/get-windows/**
  - node_modules/screenshot-desktop/**
  - node_modules/prebuild-install/**
  - "**/*.node"
  - "**/*.dylib"
  - "**/*.so"
  - "**/*.dll"
mac:
  icon: build/app.icns
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  icon: build/app.ico
  # signAndEditExecutable=false skips rcedit/wine call that embeds EXE metadata
  # Needed for cross-compile from Apple Silicon (bundled Wine lacks FreeType)
  signAndEditExecutable: false
  target:
    - nsis
# NSIS installer only — portable exe is incompatible with electron-updater.
# Shortcuts: use the NSIS installer (`TrackSync Setup …exe`).
# SmartScreen "don’t run" / unknown publisher: normal for unsigned builds. Fix with an Authenticode cert (sign in CI via CSC_LINK + CSC_KEY_PASSWORD). Users can click "More info" → "Run anyway" until then.
nsis:
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: TrackSync
  menuCategory: TrackSync
  runAfterFinish: true
linux:
  target:
    - AppImage
    - deb
  category: Utility
publish:
  provider: github
  releaseType: release
  # GitHub publisher schema has no `tagName`; tag is derived from version (see electron-builder publish docs).
  # CI can still trigger on your repo’s tag pattern; set owner/repo via package.json `repository` if auto-detect fails.
